# Render blueprint for the WorldCup26 API (backend).
# Frontend deploys to Vercel (see frontend/vercel.json + docs/DEPLOYMENT.md).
services:
  - type: web
    name: worldcup26-api
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # CLIENT_URL must equal the Vercel origin (CORS + secure cookies).
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
